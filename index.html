<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Class 9 Lectures Navigator</title>
<meta name="description" content="Class 9 study playlist navigator with subjects, chapters, exercises and YouTube links.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>9️⃣</text></svg>">
<script>
(function() {
  if (!localStorage.getItem('fonts-loaded')) {
    var pre1 = document.createElement('link'); pre1.rel = 'preconnect'; pre1.href = 'https://fonts.googleapis.com';
    var pre2 = document.createElement('link'); pre2.rel = 'preconnect'; pre2.href = 'https://fonts.gstatic.com'; pre2.crossOrigin = 'anonymous';
    var fonts = document.createElement('link'); fonts.rel = 'stylesheet'; fonts.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap';
    fonts.onload = function() { localStorage.setItem('fonts-loaded', '1'); };
    document.head.append(pre1, pre2, fonts);
  }
})();
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="top">
    <div class="titlebar">
      <button id="back" class="back" aria-label="Go back">‹</button>
      <div class="heading"><h1 id="headTitle">Class 9 Lectures</h1><p id="headSub"></p></div>
    </div>
    <div id="searchWrap" class="search"><input id="search" type="search" placeholder="Search videos…"></div>
  </header>
  <main id="screen" class="screen"><div class="empty">Loading Lectures…</div></main>
  <div id="playerOverlay" class="player-overlay" onclick="closePlayer()">
    <div class="player-wrap" onclick="event.stopPropagation()">
      <button class="player-close" onclick="closePlayer()" aria-label="Close player">✕</button>
      <div id="playerContainer" class="player-container"></div>
    </div>
  </div>
</div>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/service-worker.js').catch(()=>{})}</script>
<script src="app.js" defer></script>
</body>
</html>
